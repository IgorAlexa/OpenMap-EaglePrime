<!DOCTYPE html>

<html>

<head>

<meta charset="utf-8">
<title>EaglePrime Map</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>

html, body{
height:100%;
margin:0;
background:#1a1a1a;
}

#map{
height:100%;
}

.floorUI{
position:absolute;
left:10px;
top:10px;
z-index:1000;
background:white;
padding:10px;
border-radius:6px;
font-family:Arial;
box-shadow:0 0 10px rgba(0,0,0,0.4);
}

.floorUI button{
width:40px;
height:30px;
font-size:16px;
cursor:pointer;
}

.floorNumber{
display:inline-block;
width:40px;
text-align:center;
font-weight:bold;
}

</style>

</head>

<body>

<div id="map"></div>

<div class="floorUI">

<button onclick="floorUp()">▲</button>

<span class="floorNumber" id="floor">7</span>

<button onclick="floorDown()">▼</button>

</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>

var currentFloor = 7
var maxFloor = 15
var minFloor = 0

var map = L.map('map',{
crs:L.CRS.Simple,
minZoom:-4,
maxZoom:2
})

var bounds = [[0,0],[8192,8192]]

var layer = L.imageOverlay("foxworld_"+currentFloor+".bmp", bounds).addTo(map)

map.fitBounds(bounds)

function updateFloor(){

map.removeLayer(layer)

layer = L.imageOverlay("foxworld_"+currentFloor+".bmp", bounds).addTo(map)

document.getElementById("floor").innerText=currentFloor

}

function floorUp(){

if(currentFloor < maxFloor){
currentFloor++
updateFloor()
}

}

function floorDown(){

if(currentFloor > minFloor){
currentFloor--
updateFloor()
}

}

</script>

</body>

</html>
